<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Devartka</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-gray-50 font-sans">

    <!-- HEADER ADMIN -->
    <header class="bg-white shadow-sm border-b border-pink-100 fixed w-full z-10 py-4 px-6 md:px-12 flex justify-between items-center">
        <div class="flex items-center gap-2">
            <span class="text-xl font-bold font-serif text-deep-pink tracking-widest">DEVARTKA <span class="text-xs text-gray-400 font-sans tracking-normal">ADMIN</span></span>
        </div>
        <a href="index.html" class="text-sm font-semibold text-red-500 hover:text-red-700 flex items-center gap-2">
            Keluar <i class="fa-solid fa-right-from-bracket"></i>
        </a>
    </header>

    <!-- KONTEN UTAMA DASHBOARD -->
    <main class="pt-24 max-w-7xl mx-auto px-6 pb-12">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <!-- FORM KELOLA/TAMBAH PRODUK (KIRI) -->
            <div class="lg:col-span-1 bg-white p-6 rounded-3xl shadow-sm border border-pink-50 h-fit">
                <h2 class="text-xl font-bold mb-4 flex items-center gap-2 text-dark">
                    <i class="fa-solid fa-box-open text-deep-pink"></i> Kelola Produk
                </h2>
                <form id="productForm" class="space-y-4">
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 mb-1">Nama Produk</label>
                        <input type="text" id="pName" required class="w-full px-3 py-2 border rounded-xl text-sm focus:outline-none focus:border-deep-pink" placeholder="Contoh: Jasmine Bouquet">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 mb-1">Harga (Rp)</label>
                        <input type="number" id="pPrice" required class="w-full px-3 py-2 border rounded-xl text-sm focus:outline-none focus:border-deep-pink" placeholder="Contoh: 150000">
                    </div>
                    <button type="submit" class="w-full btn-primary py-2.5 rounded-xl font-bold text-sm tracking-wider uppercase mt-2">Simpan Produk</button>
                </form>
            </div>

            <!-- PANEL DAFTAR DATA & PESANAN MASUK (KANAN) -->
            <div class="lg:col-span-2 space-y-8">
                
                <!-- TABEL CRUD PRODUK AKTIF -->
                <div class="bg-white p-6 rounded-3xl shadow-sm border border-pink-50">
                    <h2 class="text-xl font-bold mb-4 text-dark flex items-center gap-2">
                        <i class="fa-solid fa-list-check text-deep-pink"></i> Daftar Produk Aktif (CRUD)
                    </h2>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left text-sm text-gray-500">
                            <thead class="text-xs text-gray-700 uppercase bg-pink-50/50">
                                <tr>
                                    <th class="px-4 py-3">Produk</th>
                                    <th class="px-4 py-3">Harga</th>
                                    <th class="px-4 py-3 text-center">Aksi</th>
                                </tr>
                            </thead>
                            <tbody id="adminProductTable">
                                <tr class="border-b">
                                    <td class="px-4 py-3 font-medium text-gray-900">Sweet Rose Bouquet</td>
                                    <td class="px-4 py-3">Rp 150.000</td>
                                    <td class="px-4 py-3 text-center flex justify-center gap-2">
                                        <button class="text-blue-500 hover:underline text-xs"><i class="fa-solid fa-pen"></i> Edit</button>
                                        <button onclick="this.closest('tr').remove(); showToast('Produk Berhasil Dihapus!')" class="text-red-500 hover:underline text-xs ml-2"><i class="fa-solid fa-trash"></i> Hapus</button>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- DATABASE PESANAN REAL-TIME DENGAN PELACAK METODE PEMBAYARAN -->
                <div class="bg-white p-6 rounded-3xl shadow-sm border border-pink-50">
                    <h2 class="text-xl font-bold mb-4 text-dark flex items-center gap-2">
                        <i class="fa-solid fa-receipt text-deep-pink"></i> Pesanan Masuk & Detail Pembayaran
                    </h2>
                    
                    <!-- Wadah List Data Order -->
                    <div id="webOrderContainer" class="space-y-3">
                        <p class="text-xs text-gray-400 italic text-center py-4">Belum ada pesanan masuk dari web.</p>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <!-- TOAST NOTIFIKASI FEEDBACK -->
    <div id="toast" class="fixed bottom-5 right-5 bg-gray-900 text-white px-6 py-3 rounded-xl text-sm shadow-xl transform translate-y-20 opacity-0 transition-all duration-300 z-[9999]"></div>

    <script src="js/script.js"></script>
    <script>
        // Logika Penambahan data Produk Baru (CRUD Simulasi)
        document.getElementById('productForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const name = document.getElementById('pName').value;
            const price = parseInt(document.getElementById('pPrice').value);
            
            const table = document.getElementById('adminProductTable');
            const row = document.createElement('tr');
            row.className = "border-b";
            row.innerHTML = `
                <td class="px-4 py-3 font-medium text-gray-900">${name}</td>
                <td class="px-4 py-3">Rp ${price.toLocaleString('id-ID')}</td>
                <td class="px-4 py-3 text-center flex justify-center gap-2">
                    <button class="text-blue-500 hover:underline text-xs"><i class="fa-solid fa-pen"></i> Edit</button>
                    <button onclick="this.closest('tr').remove(); showToast('Produk Berhasil Dihapus!')" class="text-red-500 hover:underline text-xs ml-2"><i class="fa-solid fa-trash"></i> Hapus</button>
                </td>
            `;
            table.appendChild(row);
            document.getElementById('productForm').reset();
            if (typeof showToast === "function") showToast("Produk Baru Berhasil Ditambahkan!");
        });

        // FUNGSI UTAMA: Membaca Database lokal & merender Metode Pembayaran dari User
        function loadOrdersToAdminDashboard() {
            const container = document.getElementById('webOrderContainer');
            const orders = JSON.parse(localStorage.getItem('devartka_orders')) || [];

            if (orders.length > 0) {
                container.innerHTML = ''; // Hapus teks kosong/default
                
                // Urutkan dari pesanan yang paling baru masuk (reverse)
                orders.reverse().forEach(order => {
                    const orderCard = document.createElement('div');
                    orderCard.className = "p-4 bg-gray-50 rounded-2xl border-l-4 border-pink-500 shadow-sm flex justify-between items-center animate-fade-in";
                    
                    // Render kartu pesanan beserta info Payment Mode yang dipilih user
                    orderCard.innerHTML = `
                        <div>
                            <div class="flex items-center gap-2 mb-1">
                                <h4 class="font-bold text-sm text-gray-800">${order.id}</h4>
                                <span class="bg-pink-100 text-deep-pink text-[9px] px-2 py-0.5 rounded-full font-semibold">${order.status}</span>
                            </div>
                            <p class="text-xs text-gray-600 font-medium">- ${order.produk}</p>
                            
                            <!-- INFO METODE PEMBAYARAN DI SISI ADMIN -->
                            <p class="text-[10px] text-gray-500 mt-1 font-semibold flex items-center gap-1">
                                <i class="fa-solid fa-credit-card text-deep-pink"></i> Pembayaran: <span class="text-gray-700 font-normal">${order.payment || 'Web Checkout'}</span>
                            </p>
                            
                            <span class="text-[10px] text-gray-400 block mt-1">${order.tanggal}</span>
                        </div>
                        <div class="text-right">
                            <p class="text-sm font-bold text-gray-800">Rp ${order.harga.toLocaleString('id-ID')}</p>
                        </div>
                    `;
                    container.appendChild(orderCard);
                });
            }
        }

        // Menjalankan fungsi pemanggilan database otomatis saat halaman admin terbuka
        window.onload = loadOrdersToAdminDashboard;
    </script>
</body>
</html>
