<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Devartka Mahar & Bunga</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="hero-pattern min-h-screen flex items-center justify-center p-6 bg-pink-50/20">
    <div class="bg-white p-8 md:p-12 rounded-[2.5rem] shadow-2xl max-w-md w-full border border-pink-100">
        <div class="text-center mb-8">
            <h1 class="font-serif text-4xl font-bold text-deep-pink tracking-widest mb-2">DEVARTKA</h1>
            <p class="text-gray-500 text-sm">Masuk untuk menjelajahi koleksi terbaik kami</p>
        </div>
        
        <form id="loginForm" class="space-y-5">
            <div>
                <label class="block text-xs font-bold uppercase tracking-wider text-gray-600 mb-2">Username</label>
                <input type="text" id="username" required class="w-full px-4 py-3 border border-pink-200 rounded-xl focus:outline-none focus:border-deep-pink bg-pink-50/30" placeholder="Masukkan username">
            </div>
            <div>
                <label class="block text-xs font-bold uppercase tracking-wider text-gray-600 mb-2">Password</label>
                <input type="password" id="password" required class="w-full px-4 py-3 border border-pink-200 rounded-xl focus:outline-none focus:border-deep-pink bg-pink-50/30" placeholder="••••••••">
            </div>
            <div id="loginError" class="text-red-500 text-xs hidden font-medium">Username atau password salah!</div>
            <button type="submit" class="w-full btn-primary py-3.5 rounded-xl font-bold uppercase tracking-widest text-sm mt-2 shadow-md">Masuk</button>
        </form>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            const error = document.getElementById('loginError');

            if (u === 'admin' && p === 'admin123') {
                window.location.href = 'admin.html';
            } else if (u === 'user' && p === 'user123') {
                window.location.href = 'home.html';
            } else {
                error.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
